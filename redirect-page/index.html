<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting to DrKabongo.com…</title>
    <link rel="canonical" href="https://drkabongo.com/" />
    <meta http-equiv="refresh" content="0; url=https://drkabongo.com/" />
    <meta name="robots" content="noindex" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #94a3b8;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      a { color: #818cf8; }
    </style>
    <script>
      // Preserve the path when redirecting
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('https://drkabongo.com' + path);
    </script>
  </head>
  <body>
    <p>
      This page has moved to
      <a href="https://drkabongo.com">drkabongo.com</a>.
      If you are not redirected automatically,
      <a href="https://drkabongo.com">click here</a>.
    </p>
  </body>
</html>
